# Manual beta release.
#
# Trigger from the Actions tab (Run workflow). Provide a version label like
# `v0.5.2-beta.1`. Builds Linux x86_64 + arm64 (deb/rpm/AppImage), macOS
# (universal dmg, signed + notarized when secrets are present), and Windows
# (msi + nsis exe). Publishes them as a *prerelease* on GitHub.
#
# Note: Tauri uses tauri.conf.json's `version` to name the bundles. The tag
# you enter here is only used for the GitHub release/tag — bundles will still
# be named with whatever version is currently in tauri.conf.json.
#
# macOS signing & notarization are opt-in via these repo secrets:
#   APPLE_CERTIFICATE              base64 of a Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD     password for the .p12
#   APPLE_SIGNING_IDENTITY         "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                       Apple ID email
#   APPLE_PASSWORD                 app-specific password from appleid.apple.com
#   APPLE_TEAM_ID                  10-char team id
#   KEYCHAIN_PASSWORD              any string; only used inside the runner
# When any of those are missing, the macOS job still builds — it just produces
# an unsigned bundle that triggers Gatekeeper warnings on end-user machines.

name: beta

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Beta version tag (e.g. v0.5.2-beta.1)'
        required: true
        type: string
      notes:
        description: 'Release notes (optional)'
        required: false
        type: string
        default: 'Manual beta build.'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: ubuntu-22.04-arm
            args: ''
            rust-targets: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config \
            build-essential \
            curl \
            wget \
            file \
            libfuse2 \
            patchelf \
            rpm \
            xdg-utils

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # Import the Developer ID Application certificate into a temporary
      # keychain so codesign can find it during the Tauri build. Skipped when
      # APPLE_CERTIFICATE isn't set — the build still produces an unsigned
      # bundle in that case.
      - name: Import macOS signing certificate
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Build and upload to draft prerelease
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # tauri-action picks these up automatically for sign + notarize +
          # staple. Empty values are treated as "skip" by the action.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ inputs.version }}
          releaseName: 'Nebula ${{ inputs.version }} (beta)'
          releaseBody: ${{ inputs.notes }}
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
          # The tag doesn't exist yet; tauri-action will create it pointing at
          # the commit this workflow ran on.
          releaseCommitish: ${{ github.sha }}

  publish:
    name: Publish prerelease
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Publish draft prerelease
        uses: actions/github-script@v7
        env:
          TAG: ${{ inputs.version }}
        with:
          script: |
            const tag = process.env.TAG;
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 50,
            });
            const draft = releases.find(r => r.tag_name === tag && r.draft);
            if (!draft) {
              core.setFailed(`No draft release found for tag ${tag}`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: draft.id,
              draft: false,
              prerelease: true,
            });
            core.info(`Published prerelease ${tag} (id ${draft.id})`);
